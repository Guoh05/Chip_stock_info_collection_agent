<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Chip Stock Webapp{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header class="site-header">
        <div class="container">
            <a href="/query" class="brand">Chip Stock Webapp</a>
            <nav>
                <a href="/query">新查询</a>
                <a href="/history">历史</a>
                {% if current_user %}
                <span style="color:#bbb; margin-left:16px; font-size:13px;">{{ current_user }}</span>
                <a href="/logout" style="font-size:13px;">注销</a>
                {% endif %}
            </nav>
        </div>
    </header>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <footer class="site-footer container">
        <small>Phase 2 webapp · Versuni</small>
    </footer>
</body>
</html>
